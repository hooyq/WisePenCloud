server:
  port: 19903 # 本地启动占用 19903 端口

spring:
  application:
    name: wisepen-user-service # 服务名，也是 Nacos 里的 Data ID
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos 注册中心地址；外部默认 localhost
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos 配置中心地址；外部默认 localhost
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml # 配置文件后缀
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces:
        - VMnet.*
        - vEthernet.*
        - docker0 # 忽略常见的虚拟机网卡名称 (正则匹配)
      preferred-networks:
        - 10 #指定首选的网络号段 (校园网段10开头)
  profiles:
    active: dev # 激活开发环境配置

wisepen:
  openapi:
    title: 用户服务 API
    version: 1.0.0
    description: WisePen 用户、认证、小组与钱包接口

springwolf:
  plugin:
    kafka:
      scanner:
        kafka-listener:
          enabled: false
  docket:
    base-package: com.oriole.wisepen.user
    info:
      title: 用户服务 Kafka Events
      version: 1.0.0
      description: Token 计费与复旦 UIS 认证请求相关 Kafka 消息契约
