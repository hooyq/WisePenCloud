server:
  port: 19908 # 本地启动占用 19908 端口

spring:
  application:
    name: wisepen-note-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces:
        - VMnet.*
        - vEthernet.*
        - docker0
      preferred-networks:
        - 10
  profiles:
    active: dev

wisepen:
  openapi:
    title: 笔记服务 API
    version: 1.0.0
    description: WisePen 笔记内容、操作日志与详情接口

springwolf:
  plugin:
    kafka:
      scanner:
        kafka-listener:
          enabled: false
  docket:
    base-package: com.oriole.wisepen.note
    info:
      title: 笔记服务 Kafka Events
      version: 1.0.0
      description: 笔记快照、操作日志与资源删除相关 Kafka 消息契约
