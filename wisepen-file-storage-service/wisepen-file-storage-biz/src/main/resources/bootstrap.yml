server:
  port: 19907 # 本地启动占用 19907 端口
  tomcat:
    connection-timeout: 60000
    accept-count: 100

spring:
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大限制
      max-request-size: 50MB   # 单次请求总大小限制
  application:
    name: wisepen-file-storage-service
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces: [VMnet.*, vEthernet.*, docker0]
      preferred-networks: [10]
  profiles:
    active: dev

logging:
  level:
    root: INFO
    org.jodconverter: DEBUG
    com.oriole.wisepen.file: INFO

wisepen:
  openapi:
    title: 文件存储服务 API
    version: 1.0.0
    description: WisePen 文件上传、下载、删除与回调接口

springwolf:
  plugin:
    kafka:
      scanner:
        kafka-listener:
          enabled: false
  docket:
    base-package: com.oriole.wisepen.file.storage
    info:
      title: 文件存储服务 Kafka Events
      version: 1.0.0
      description: 文件上传完成与对象删除相关 Kafka 消息契约
