server:
  port: 19906 # 本地启动占用 19906 端口
  tomcat:
    connection-timeout: 60000
    accept-count: 100

spring:
  application:
    name: wisepen-document-service
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces: [VMnet.*, vEthernet.*, docker0]
      preferred-networks: [10]
  profiles:
    active: dev
  
jodconverter:
  local:
    enabled: false
  remote:
    enabled: true
    url: http://localhost:8100/

wisepen:
  document:
    conversion-provider: ${WISEPEN_DOCUMENT_CONVERSION_PROVIDER:onlyoffice}
    onlyoffice-internal-url: ${WISEPEN_ONLYOFFICE_INTERNAL_URL:http://onlyoffice:8101/}
    onlyoffice-callback-base-url: ${WISEPEN_ONLYOFFICE_CALLBACK_BASE_URL:http://apisix/}
    onlyoffice-jwt-secret: ${WISEPEN_ONLYOFFICE_JWT_SECRET:wisepen-onlyoffice-dev-secret}
    onlyoffice-jwt-header: ${WISEPEN_ONLYOFFICE_JWT_HEADER:Authorization}
    onlyoffice-jwt-prefix: "${WISEPEN_ONLYOFFICE_JWT_PREFIX:Bearer }"
    onlyoffice-conversion-timeout-ms: ${WISEPEN_ONLYOFFICE_CONVERSION_TIMEOUT_MS:120000}
    onlyoffice-conversion-poll-interval-ms: ${WISEPEN_ONLYOFFICE_CONVERSION_POLL_INTERVAL_MS:1000}
    onlyoffice-source-url-duration-seconds: ${WISEPEN_ONLYOFFICE_SOURCE_URL_DURATION_SECONDS:3600}
    onlyoffice-edit-session-ttl-seconds: ${WISEPEN_ONLYOFFICE_EDIT_SESSION_TTL_SECONDS:86400}
  openapi:
    title: 文档服务 API
    version: 1.0.0
    description: WisePen 文档上传、解析、转换与详情接口

springwolf:
  plugin:
    kafka:
      scanner:
        kafka-listener:
          enabled: false
  docket:
    base-package: com.oriole.wisepen.document
    info:
      title: 文档服务 Kafka Events
      version: 1.0.0
      description: 文档解析任务、文档就绪与文件清理相关 Kafka 消息契约

logging:
  level:
    root: INFO
    org.jodconverter: DEBUG
    com.oriole.wisepen.file: INFO
