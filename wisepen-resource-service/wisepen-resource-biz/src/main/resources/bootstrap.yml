server:
  port: 19905 # 本地启动占用 19905 端口

spring:
  application:
    name: wisepen-resource-service # 服务名，也是 Nacos 里的 Data ID
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos 注册中心地址；外部默认 localhost
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848} # Nacos 配置中心地址；外部默认 localhost
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml # 配置文件后缀
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces:
        - VMnet.*
        - vEthernet.*
        - docker0 # 忽略常见的虚拟机网卡名称 (正则匹配)
      preferred-networks:
        - 10 #指定首选的网络号段 (校园网段10开头)
  profiles:
    active: dev # 激活开发环境配置

# 资源服务业务配置
wisepen:
  openapi:
    title: 资源服务 API
    version: 1.0.0
    description: WisePen 资源、标签、搜索与交互接口
  resource:
    # 阅读量去重窗口时长（分钟）。
    # 同一用户在此时间内重复打开同一资源，仅计一次阅读。
    read-dedup-ttl-minutes: 10

springwolf:
  plugin:
    kafka:
      scanner:
        kafka-listener:
          enabled: false
  docket:
    base-package: com.oriole.wisepen.resource
    info:
      title: 资源服务 Kafka Events
      version: 1.0.0
      description: 资源 ACL 重算、资源物理删除与内容索引同步相关 Kafka 消息契约
